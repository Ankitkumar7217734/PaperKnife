name: Build & Sign Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Fetch OCR Binaries (Global Version Only)
        run: |
          mkdir -p public/tesseract
          curl -Lo public/tesseract/tesseract-core.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core.wasm
          curl -Lo public/tesseract/tesseract-core-simd.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core-simd.wasm
          curl -Lo public/tesseract/tesseract-core-lstm.wasm https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core-lstm.wasm
          curl -Lo public/tesseract/tesseract-core.wasm.js https://unpkg.com/tesseract.js-core@v5.1.1/tesseract-core.wasm.js
          curl -Lo public/tesseract/worker.min.js https://unpkg.com/tesseract.js@v5.1.1/dist/worker.min.js
          curl -Lo public/tesseract/eng.traineddata.gz https://raw.githubusercontent.com/naptha/tessdata/gh-pages/4.0.0/eng.traineddata.gz
          gunzip public/tesseract/eng.traineddata.gz

      - name: Build Web Assets (Global)
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set App Version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          mkdir -p ../debug-artifacts
          mv app/build/outputs/apk/debug/app-debug.apk "../debug-artifacts/paperknife-debug-v${{ steps.version.outputs.value }}.apk"

      - name: Build Global Release APK
        run: |
          cd android
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../paperknife-global-unsigned.apk

      - name: Build F-Droid Lite APK (No OCR)
        run: |
          rm -rf public/tesseract/
          export VITE_DISABLE_OCR=true
          npm run build
          npx cap sync android
          cd android
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../paperknife-fdroid-unsigned.apk

      - name: Sign Release APKs
        id: sign_app
        if: secrets.ANDROID_SIGNING_KEY != ''
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: .
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Rename Signed Release APKs
        if: secrets.ANDROID_SIGNING_KEY != ''
        run: |
          cp paperknife-global-unsigned-signed.apk "paperknife-v${{ steps.version.outputs.value }}.apk"
          cp paperknife-fdroid-unsigned-signed.apk "paperknife-lite-v${{ steps.version.outputs.value }}.apk"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PaperKnife-debug-v${{ steps.version.outputs.value }}
          path: debug-artifacts/paperknife-debug-v${{ steps.version.outputs.value }}.apk
          if-no-files-found: error

      - name: Upload Signed Release APKs
        if: secrets.ANDROID_SIGNING_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: PaperKnife-v${{ steps.version.outputs.value }}
          path: |
            paperknife-v${{ steps.version.outputs.value }}.apk
            paperknife-lite-v${{ steps.version.outputs.value }}.apk
          if-no-files-found: error
